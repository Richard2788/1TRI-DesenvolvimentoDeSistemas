<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="mycss.css" rel="stylesheet">
    <title>Cadastro</title>
</head>
<body>
    <header>

    </header>
    <main>
        <div class="main1_cont">
        <h1>Cadastro de clientes</h1>
        <form>
            <div class="form_cont">
                <label for="nome">Nome:</label>
                <input type="text" id="nome" placeholder="Ricardo Nascimento Pedroso" required class="input_text">
                <label for="cpf">CPF:</label>
                <input type="text" id="cpf" placeholder="000.000.000-00" required class="input_text">
                <label for="dt_nasc">Data de nascimento:</label>
                <input type="date" id="dt_nasc" required class="input_text">
                <label for="email">E-mail:</label>
                <input type="email" id="email" placeholder="exemplo.legal@gmail.com" required class="input_text">
                <label for="tel">Telefone:</label>
                <input type="tel" id="celular" placeholder="(00) 00000-0000" required class="input_text">
                <label for="cep">CEP:</label>
                <input type="tel" id="cep" placeholder="00000-000" required class="input_text">
                <label for="rua">Rua:</label>
                <input type="text" id="rua" placeholder="Av. Anita Garibaldi" required class="input_text">
                <label for="n_rua">Número:</label>
                <input type="number" id="n_rua" placeholder="0000" required class="input_text">
                <label for="b_rua">Bairro:</label>
                <input type="text" id="b_rua" placeholder="Castanheira" required class="input_text">
                <label for="cidade">Cidade:</label>
                <input type="text" id="cidade" placeholder="Campo Largo" required class="input_text">
                <label for="uf">Estado:</label>
                <input type="text" id="uf" placeholder="Rio de Janeiro" required class="input_text">
                <label for="senha">Senha:</label>
                <input type="password" id="senha" placeholder="bombom123" required class="input_text">

                <!-- CEP, Rua, Número, Bairro, Cidade, Estado(UF), Senha-->

                <input type="submit" value="Enviar cadastro" class="btn_enviar">
            </div>
        </div>
        </form>
    </main>
    <footer>

    </footer>
</body>
</html>
